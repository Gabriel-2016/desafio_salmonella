<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#166534">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Desafio Salmonella - Ranking Global</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Desafio Salmonella','short_name':'Salmonella','start_url':'.','display':'standalone','background_color':'#f0fdf4','theme_color':'#166534'}">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0fdf4;
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        .card-anim { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .pulse-correct { animation: pulse-green 0.5s; }
        .shake-wrong { animation: shake 0.5s; }

        @keyframes pulse-green {
            0% { background-color: #fff; }
            50% { background-color: #86efac; }
            100% { background-color: #fff; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .progress-bar { transition: width 0.5s ease-in-out; }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }

        .game-height {
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #16a34a;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4">

    <div class="game-height">
        <div id="game-container" class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-6 md:p-8 card-anim relative overflow-hidden max-h-[95dvh] overflow-y-auto">
            
            <!-- Tela Inicial -->
            <div id="start-screen" class="text-center">
                <div class="mb-4 text-6xl">🔬</div>
                <h1 class="text-3xl font-extrabold text-green-800 mb-2">Desafio Salmonella</h1>
                <p class="text-gray-600 mb-6 text-base">Testa os teus conhecimentos e compete globalmente!</p>
                
                <div class="space-y-3">
                    <input type="text" id="player-name" placeholder="O teu nome" class="w-full p-4 border-2 border-green-100 rounded-xl focus:border-green-500 outline-none text-center text-lg">
                    
                    <button id="btn-start" onclick="startGame()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-green-200">
                        JOGAR AGORA
                    </button>

                    <button id="btn-leaderboard" onclick="toggleLeaderboard(true)" class="w-full bg-white border-2 border-green-600 text-green-600 font-bold py-3 rounded-xl active:bg-green-50 transition-all flex items-center justify-center gap-2">
                        🌎 Ranking Global
                    </button>
                </div>
                <div id="auth-status" class="mt-4 text-[10px] text-gray-400 font-bold flex justify-center items-center gap-2">
                    <div class="loading-spinner"></div> A verificar ligação...
                </div>
            </div>

            <!-- Tela de Jogo -->
            <div id="quiz-screen" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <span id="difficulty-badge" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase"></span>
                    <span class="text-green-700 font-bold text-lg">Pts: <span id="current-score">0</span></span>
                </div>

                <div class="w-full bg-gray-100 h-2 rounded-full mb-6">
                    <div id="progress" class="bg-green-500 h-2 rounded-full progress-bar" style="width: 0%"></div>
                </div>

                <h2 id="question-text" class="text-xl font-bold text-gray-800 mb-6 leading-tight">Carregando...</h2>

                <div id="options-container" class="space-y-3"></div>
            </div>

            <!-- Tela Final -->
            <div id="end-screen" class="hidden text-center">
                <h2 class="text-2xl font-bold text-gray-800 mb-1">Fim!</h2>
                <div id="final-emoji" class="text-5xl mb-2">🏆</div>
                <p id="final-message" class="text-base text-gray-600 mb-4 font-medium"></p>
                <div class="bg-green-50 p-4 rounded-2xl mb-6 border border-green-100">
                    <span class="block text-[10px] text-green-600 uppercase font-bold tracking-widest mb-1">Pontuação Final</span>
                    <span id="final-score" class="text-5xl font-black text-green-800">0</span>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="resetGame()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl active:scale-95 transition-all">
                        REPETIR JOGO
                    </button>
                    <button onclick="toggleLeaderboard(true)" class="text-green-600 font-semibold py-2">
                        Ver Líderes Globais
                    </button>
                </div>
            </div>

            <!-- Modal do Ranking Global -->
            <div id="leaderboard-modal" class="hidden absolute inset-0 z-50 modal-overlay flex items-center justify-center p-4">
                <div class="bg-white w-full max-h-[80vh] rounded-2xl shadow-2xl flex flex-col p-6">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h2 class="text-xl font-extrabold text-green-800">🌎 Top 10 Global</h2>
                        <button onclick="toggleLeaderboard(false)" class="text-gray-400 text-3xl">&times;</button>
                    </div>
                    <div id="leaderboard-list" class="flex-1 overflow-y-auto space-y-2 pr-1 text-left">
                        <div class="flex justify-center p-10"><div class="loading-spinner"></div></div>
                    </div>
                    <button onclick="toggleLeaderboard(false)" class="mt-4 w-full bg-gray-100 py-3 rounded-xl font-bold">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, limit, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Estado do Jogo Global
        window.gameState = {
            user: null,
            score: 0,
            currentQuestion: 0,
            playerName: "",
            leaderboard: [],
            isOnline: false
        };

        let db, auth;

        async function startFirebase() {
            try {
                // Tenta obter config do ambiente ou falha silenciosamente
                if (typeof __firebase_config === 'undefined') {
                    throw new Error("Ambiente sem Firebase");
                }

                const firebaseConfig = JSON.parse(__firebase_config);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'salmonella-quiz-global';
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // Regra 3: Auth Antes de Queries
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };

                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    window.gameState.user = user;
                    if (user) {
                        window.gameState.isOnline = true;
                        document.getElementById('auth-status').innerHTML = "✅ Ligado ao Ranking Global";
                        setupLeaderboardListener(db, appId);
                    }
                });

            } catch (error) {
                console.warn("Modo Offline Ativado:", error.message);
                document.getElementById('auth-status').innerHTML = "📴 Modo Local (Sem Ranking Global)";
                window.gameState.isOnline = false;
            }
        }

        function setupLeaderboardListener(db, appId) {
            // Regra 1: Caminho estrito
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            
            // Regra 2: Sem queries complexas, filtro em JS
            onSnapshot(q, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => data.push(doc.data()));
                window.gameState.leaderboard = data
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 10);
                
                if (!document.getElementById('leaderboard-modal').classList.contains('hidden')) {
                    window.renderLeaderboardUI();
                }
            }, (error) => {
                console.error("Erro Firestore:", error);
            });
        }

        window.saveScoreToGlobal = async (name, score) => {
            if (!window.gameState.isOnline || !window.gameState.user) return;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'salmonella-quiz-global';
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard'), {
                    name: name,
                    score: score,
                    timestamp: Date.now(),
                    userId: window.gameState.user.uid
                });
            } catch (e) {
                console.error("Erro ao gravar:", e);
            }
        };

        startFirebase();
    </script>

    <script>
        // Lógica do Quiz e UI
        const questions = [
            { q: "Qual destes alimentos é o mais comum para a transmissão de Salmonella?", options: ["Ovos crus", "Pão", "Maçãs", "Arroz"], correct: 0, difficulty: "Fácil" },
            { q: "Regra de ouro para evitar a bactéria na cozinha?", options: ["Usar sal", "Cozinhar bem", "Lavar carne crua", "Congelar"], correct: 1, difficulty: "Fácil" },
            { q: "Onde se localiza a Salmonella no corpo?", options: ["Pulmões", "Coração", "Intestino", "Cérebro"], correct: 2, difficulty: "Fácil" },
            { q: "Temperatura mínima de segurança para aves?", options: ["55°C", "74°C", "100°C", "40°C"], correct: 1, difficulty: "Médio" },
            { q: "O que é contaminação cruzada?", options: ["Misturar cores", "Bactérias de item cru para pronto", "Cozinhar junto", "Lavar as mãos"], correct: 1, difficulty: "Médio" },
            { q: "Sintomas mais comuns?", options: ["Tosse", "Diarreia e febre", "Surdez", "Manchas"], correct: 1, difficulty: "Médio" },
            { q: "Variedade que causa Febre Tifóide?", options: ["Enteritidis", "Typhimurium", "Typhi", "Agona"], correct: 2, difficulty: "Difícil" },
            { q: "Classificação da Salmonella?", options: ["Gram-positiva", "Gram-negativa", "Vírus", "Fungo"], correct: 1, difficulty: "Difícil" },
            { q: "Período médio de incubação?", options: ["5 min", "6h a 6 dias", "3 meses", "Imediato"], correct: 1, difficulty: "Difícil" }
        ];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(type === 'correct' ? 600 : 150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) {}
        }

        function toggleLeaderboard(show) {
            const modal = document.getElementById('leaderboard-modal');
            if (show) {
                window.renderLeaderboardUI();
                modal.classList.remove('hidden');
            } else modal.classList.add('hidden');
        }

        window.renderLeaderboardUI = function() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '';
            
            if (!window.gameState.isOnline) {
                list.innerHTML = "<p class='text-center text-red-400 py-4 text-sm'>Ranking Global indisponível no modo local.</p>";
                return;
            }

            const data = window.gameState.leaderboard;
            if(!data || data.length === 0) {
                list.innerHTML = "<p class='text-center text-gray-400 py-4 italic text-sm'>A carregar dados ou sem recordes...</p>";
            } else {
                data.forEach((e, i) => {
                    list.innerHTML += `<div class='flex justify-between p-3 bg-gray-50 rounded-lg text-sm mb-2 border border-gray-100'><b>${i+1}. ${e.name}</b> <span class='text-green-600 font-bold'>${e.score} pts</span></div>`;
                });
            }
        };

        function startGame() {
            const nameInput = document.getElementById('player-name').value.trim();
            window.gameState.playerName = nameInput || "Anónimo";
            window.gameState.currentQuestion = 0;
            window.gameState.score = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[window.gameState.currentQuestion];
            const container = document.getElementById('game-container');
            container.classList.remove('pulse-correct', 'shake-wrong');
            
            document.getElementById('difficulty-badge').innerText = q.difficulty;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('current-score').innerText = window.gameState.score;
            document.getElementById('progress').style.width = `${(window.gameState.currentQuestion / questions.length) * 100}%`;

            const box = document.getElementById('options-container');
            box.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-gray-100 active:bg-green-50 active:border-green-400 font-medium text-gray-700 text-sm transition-all";
                btn.innerText = opt;
                btn.onclick = () => check(idx);
                box.appendChild(btn);
            });
        }

        function check(choice) {
            const q = questions[window.gameState.currentQuestion];
            const container = document.getElementById('game-container');
            
            if (choice === q.correct) {
                window.gameState.score += (q.difficulty === 'Fácil' ? 100 : q.difficulty === 'Médio' ? 250 : 500);
                playSound('correct');
                container.classList.add('pulse-correct');
            } else {
                playSound('wrong');
                container.classList.add('shake-wrong');
            }

            setTimeout(async () => {
                window.gameState.currentQuestion++;
                if (window.gameState.currentQuestion < questions.length) {
                    renderQuestion();
                } else {
                    document.getElementById('quiz-screen').classList.add('hidden');
                    document.getElementById('end-screen').classList.remove('hidden');
                    document.getElementById('final-score').innerText = window.gameState.score;
                    document.getElementById('final-message').innerText = window.gameState.score >= 1500 ? "Incrível! És um mestre da biossegurança!" : "Bom esforço! Continua a aprender.";
                    
                    if (window.saveScoreToGlobal) {
                        await window.saveScoreToGlobal(window.gameState.playerName, window.gameState.score);
                    }
                }
            }, 600);
        }

        function resetGame() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
